name: Upstream Build App

on:
  schedule:
    - cron: '30 6 * * *'
  pull_request:
    paths:
      - install.sh
      - Makefile
      - scripts/patch-linux-window-ui.js
      - scripts/patch-linux-window-ui.test.js
      - scripts/patches/**
      - linux-features/remote-mobile-control/**
      - scripts/ci/validate-patch-report.js
      - .github/workflows/upstream-build-app.yml
  push:
    branches:
      - main
    paths:
      - install.sh
      - Makefile
      - scripts/patch-linux-window-ui.js
      - scripts/patch-linux-window-ui.test.js
      - scripts/patches/**
      - linux-features/remote-mobile-control/**
      - scripts/ci/validate-patch-report.js
      - .github/workflows/upstream-build-app.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UPSTREAM_DMG_URL: https://persistent.oaistatic.com/codex-app-prod/ChatGPT.dmg
  UPSTREAM_DMG_PATH: /tmp/codex-upstream-ci/Codex.dmg
  DMG_CACHE_SCHEMA_VERSION: v1

jobs:
  build-app-upstream-dmg:
    name: Build App Against Upstream DMG
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full make g++ python3 curl unzip

      - name: Capture upstream DMG metadata
        id: upstream-metadata
        run: |
          set -euo pipefail

          headers_file="$(mktemp)"
          trap 'rm -f "$headers_file"' EXIT

          curl -fsSLI "$UPSTREAM_DMG_URL" > "$headers_file"

          # Match header names case-insensitively without gawk's IGNORECASE,
          # which is a no-op under mawk (the default awk on ubuntu runners).
          last_modified="$(awk 'tolower($0) ~ /^last-modified:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); print; exit}' "$headers_file")"
          etag="$(awk 'tolower($0) ~ /^etag:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); gsub(/"/,""); print; exit}' "$headers_file")"
          content_length="$(awk 'tolower($0) ~ /^content-length:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); print; exit}' "$headers_file")"

          if [ -z "$last_modified" ]; then
            last_modified="unknown"
          fi
          if [ -z "$etag" ]; then
            etag="no-etag"
          fi
          if [ -z "$content_length" ]; then
            content_length="unknown"
          fi

          cache_segment="$(printf '%s|%s|%s\n' "$last_modified" "$etag" "$content_length" | sha256sum | cut -d' ' -f1)"

          {
            echo "last_modified=$last_modified"
            echo "etag=$etag"
            echo "content_length=$content_length"
            echo "cache_segment=$cache_segment"
          } >> "$GITHUB_OUTPUT"

      - name: Restore cached upstream DMG
        id: dmg-cache
        uses: actions/cache@v4
        with:
          path: /tmp/codex-upstream-ci/Codex.dmg
          key: upstream-dmg-${{ env.DMG_CACHE_SCHEMA_VERSION }}-${{ steps.upstream-metadata.outputs.cache_segment }}

      - name: Download upstream DMG
        if: steps.dmg-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$UPSTREAM_DMG_PATH")"
          curl -fL --retry 3 -o "$UPSTREAM_DMG_PATH" "$UPSTREAM_DMG_URL"

      - name: Record local DMG fingerprint
        id: local-dmg
        run: |
          set -euo pipefail

          test -s "$UPSTREAM_DMG_PATH"

          dmg_sha256="$(sha256sum "$UPSTREAM_DMG_PATH" | cut -d' ' -f1)"
          dmg_size_bytes="$(stat -c '%s' "$UPSTREAM_DMG_PATH")"
          tested_at_utc="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "sha256=$dmg_sha256"
            echo "size_bytes=$dmg_size_bytes"
            echo "tested_at_utc=$tested_at_utc"
          } >> "$GITHUB_OUTPUT"

          cat > upstream-dmg-metadata.json <<JSON
          {
            "url": "$UPSTREAM_DMG_URL",
            "path": "$UPSTREAM_DMG_PATH",
            "last_modified": "${{ steps.upstream-metadata.outputs.last_modified }}",
            "etag": "${{ steps.upstream-metadata.outputs.etag }}",
            "content_length": "${{ steps.upstream-metadata.outputs.content_length }}",
            "sha256": "$dmg_sha256",
            "size_bytes": "$dmg_size_bytes",
            "tested_at_utc": "$tested_at_utc",
            "cache_schema_version": "${{ env.DMG_CACHE_SCHEMA_VERSION }}"
          }
          JSON

      - name: Build app from upstream DMG
        run: CODEX_PATCH_REPORT_JSON="$GITHUB_WORKSPACE/patch-report.json" make build-app DMG=/tmp/codex-upstream-ci/Codex.dmg

      - name: Extract upstream app version
        id: app-version
        run: |
          set -euo pipefail

          # The build extracts the app to codex-app/resources/app.asar.unpacked
          # But we need the original macOS .app bundle for Info.plist
          # Extract it from the DMG
          extract_dir="$(mktemp -d)"
          trap 'rm -rf "$extract_dir"' EXIT

          7z x -o"$extract_dir" "$UPSTREAM_DMG_PATH" >/dev/null 2>&1 || true

          # Find the .app bundle
          app_bundle=$(find "$extract_dir" -maxdepth 2 -name "*.app" -type d | head -n 1)

          if [ -z "$app_bundle" ]; then
            echo "app_version=unknown" >> "$GITHUB_OUTPUT"
            echo "Warning: Could not find .app bundle in DMG"
            exit 0
          fi

          info_plist="$app_bundle/Contents/Info.plist"

          if [ ! -f "$info_plist" ]; then
            echo "app_version=unknown" >> "$GITHUB_OUTPUT"
            echo "Warning: Info.plist not found at $info_plist"
            exit 0
          fi

          # Use the existing appBundleVersion helper from build-info.js
          app_version=$(node -e "
            const { appBundleVersion } = require('./scripts/lib/build-info.js');
            const version = appBundleVersion('$app_bundle');
            console.log(version || 'unknown');
          ")

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "Extracted app version: $app_version"

      - name: Validate required upstream patches
        run: node scripts/ci/validate-patch-report.js patch-report.json --profile upstream-build

      - name: Inspect upstream DMG with remote mobile control enabled
        run: |
          set -euo pipefail

          features_config="$(mktemp)"
          report_dir="$GITHUB_WORKSPACE/remote-mobile-upstream-inspect"
          trap 'rm -f "$features_config"' EXIT

          printf '%s\n' '{"enabled":["remote-mobile-control"]}' > "$features_config"

          CODEX_LINUX_FEATURES_CONFIG="$features_config" \
            make inspect-upstream DMG="$UPSTREAM_DMG_PATH" REBUILD_REPORT_DIR="$report_dir"

          node scripts/ci/validate-patch-report.js "$report_dir/patch-report.json" \
            --profile upstream-build \
            --require-enabled-feature remote-mobile-control \
            --require-applied linux-app-server-conversation-hydration \
            --require-applied linux-completed-item-recovery \
            --require-applied feature:remote-mobile-control:linux-remote-control-load-gate \
            --require-success feature:remote-mobile-control:linux-remote-mobile-conversation-hydration \
            --require-applied feature:remote-mobile-control:linux-remote-control-status-read-guard \
            --require-applied feature:remote-mobile-control:linux-remote-control-status-wait

      - name: Upload upstream DMG metadata artifact
        # The build step now aborts on critical patch failures; keep uploading
        # the patch report so the failure is diagnosable from the artifact.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-dmg-metadata
          path: |
            upstream-dmg-metadata.json
            patch-report.json
            remote-mobile-upstream-inspect/*.json
          if-no-files-found: ignore

      - name: Write build summary
        run: |
          {
            echo "## Upstream Build App"
            echo ""
            echo "- DMG URL: \`$UPSTREAM_DMG_URL\`"
            echo "- DMG Last-Modified: \`${{ steps.upstream-metadata.outputs.last_modified }}\`"
            echo "- DMG ETag: \`${{ steps.upstream-metadata.outputs.etag }}\`"
            echo "- DMG Content-Length: \`${{ steps.upstream-metadata.outputs.content_length }}\`"
            echo "- DMG SHA-256: \`${{ steps.local-dmg.outputs.sha256 }}\`"
            echo "- DMG Size (bytes): \`${{ steps.local-dmg.outputs.size_bytes }}\`"
            echo "- Tested At (UTC): \`${{ steps.local-dmg.outputs.tested_at_utc }}\`"
            echo "- Cache Hit: \`${{ steps.dmg-cache.outputs.cache-hit || 'false' }}\`"
            echo "- App Version: \`${{ steps.app-version.outputs.app_version }}\`"
            echo "- Build command: \`make build-app DMG=/tmp/codex-upstream-ci/Codex.dmg\`"
            echo "- Patch report: \`patch-report.json\`"
            echo "- Remote mobile inspect: \`make inspect-upstream DMG=$UPSTREAM_DMG_PATH\` with \`remote-mobile-control\` enabled"
            echo "- Remote mobile patch report: \`remote-mobile-upstream-inspect/patch-report.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open tracking issue for new version
        if: github.event_name == 'schedule' && steps.app-version.outputs.app_version != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const appVersion = '${{ steps.app-version.outputs.app_version }}';
            const label = 'upstream-version';
            const title = `New upstream version ${appVersion} detected`;

            // Check if an issue for this version already exists
            const existingIssues = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const versionExists = existingIssues.data.some(issue =>
              issue.title.includes(appVersion)
            );

            if (versionExists) {
              console.log(`Issue for version ${appVersion} already exists, skipping creation.`);
              return;
            }

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: label,
                color: '0366d6',
                description: 'New upstream version detected by scheduled build',
              });
            }

            // Read the playbook
            const playbook = fs.readFileSync('.github/NEW_VERSION_PLAYBOOK.md', 'utf8');

            // Build the issue body
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `A new upstream Codex Desktop version has been detected by the scheduled build workflow.`,
              '',
              '## Version Information',
              '',
              `- **Version**: \`${appVersion}\``,
              `- **DMG URL**: \`${{ env.UPSTREAM_DMG_URL }}\``,
              `- **DMG SHA-256**: \`${{ steps.local-dmg.outputs.sha256 }}\``,
              `- **DMG Last-Modified**: \`${{ steps.upstream-metadata.outputs.last_modified }}\``,
              `- **DMG ETag**: \`${{ steps.upstream-metadata.outputs.etag }}\``,
              `- **DMG Size**: \`${{ steps.local-dmg.outputs.size_bytes }}\` bytes`,
              `- **Detected At**: \`${{ steps.local-dmg.outputs.tested_at_utc }}\``,
              '',
              '## Build Information',
              '',
              `- **Workflow Run**: ${runUrl}`,
              `- **Artifacts**: [upstream-dmg-metadata](${runUrl}#artifacts) (includes \`patch-report.json\`)`,
              '',
              '## Agent Playbook',
              '',
              'Follow the playbook below to address this new version:',
              '',
              '---',
              '',
              playbook,
            ].join('\n');

            // Create the issue
            await github.rest.issues.create({
              ...context.repo,
              title,
              labels: [label],
              body,
            });
